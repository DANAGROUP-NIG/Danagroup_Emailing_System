
# Development override — mounts source code for hot-reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  frontend:
    build:
      context: ./dims-frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./dims-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_APP_NAME=DIMS (Dev)
      - INTERNAL_API_ORIGIN=http://api:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    ports:
      - "3001:3000"  # Direct Next.js access — full stack available via nginx on :3000

  api:
    build:
      context: ./dims-backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    volumes:
      - ./dims-backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
    ports:
      - "8000:8000"
      - "9229:9229"  # Node.js debugger

  postgres:
    ports:
      - "5433:5432"  # Expose for local DB tools without colliding with local Postgres

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  elasticsearch:
    ports:
      - "9200:9200"

  nginx:
    ports:
      - "3000:80"   # Full stack (nginx → Next.js + API proxy)
      - "3443:443"  # HTTPS
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
