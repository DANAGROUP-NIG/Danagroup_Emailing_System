
# Development override — mounts source code for hot-reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  frontend:
    build:
      context: ./dims-frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./dims-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3000
      - NEXT_PUBLIC_APP_NAME=DIMS (Dev)
      - INTERNAL_API_ORIGIN=http://api:8000
      - JWT_SECRET=${JWT_SECRET}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    # port 3001:3000 already exposed in base compose

  api:
    build:
      context: ./dims-backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    volumes:
      - ./dims-backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
    ports:
      - "9229:9229"  # Node.js debugger (api:8000 already exposed in base compose)

  nginx:
    ports:
      - "3000:80"   # Full stack (nginx → Next.js + API proxy)
      - "3443:443"  # HTTPS
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
