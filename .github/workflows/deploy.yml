name: Deploy

on:
  push:
    branches: [main, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          NODE_ENV=staging
          APP_URL=${{ secrets.STAGING_APP_URL }}
          DB_HOST=${{ secrets.STAGING_DB_HOST }}
          DB_PORT=${{ secrets.STAGING_DB_PORT }}
          DB_NAME=${{ secrets.STAGING_DB_NAME }}
          DB_USER=${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          REDIS_HOST=${{ secrets.STAGING_REDIS_HOST }}
          REDIS_PORT=${{ secrets.STAGING_REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          MINIO_ENDPOINT=${{ secrets.STAGING_MINIO_ENDPOINT }}
          MINIO_PORT=${{ secrets.STAGING_MINIO_PORT }}
          MINIO_ACCESS_KEY=${{ secrets.STAGING_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.STAGING_MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.STAGING_MINIO_BUCKET }}
          ES_NODE=${{ secrets.STAGING_ES_NODE }}
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          JWT_ACCESS_EXPIRY=15m
          JWT_REFRESH_EXPIRY=7d
          FRONTEND_URL=${{ secrets.STAGING_FRONTEND_URL }}
          SESSION_SECRET=${{ secrets.STAGING_SESSION_SECRET }}
          EOF

      - name: Pull latest images and restart
        run: |
          docker compose pull
          docker compose build --no-cache
          docker compose up -d --remove-orphans

      - name: Run database migrations
        run: |
          docker compose exec -T api npm run migration:run

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost/api/health || exit 1

      - name: Notify on success
        if: success()
        run: echo "Staging deployment successful — ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "Staging deployment FAILED — ${{ github.sha }}"

  # ─── Wait for CI checks before production deployment ─────────────────────────
  wait-for-ci:
    name: Wait for CI checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Wait for frontend CI
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: "Frontend — Lint, Type-check & Build"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success,skipped

      - name: Wait for backend CI
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: "Backend — Lint, Type-check & Test"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success,skipped

  # ─── Deploy to Production on Azure VM (manual approval required) ─────────────
  deploy-production:
    name: Deploy to Production (Azure VM)
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub Environments
    needs: [wait-for-ci]
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_AZURE_HOST }}
          username: ${{ secrets.PROD_AZURE_USER }}
          key: ${{ secrets.PROD_AZURE_SSH_KEY }}
          port: ${{ secrets.PROD_AZURE_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 45m
          script_stop: false
          script: |
            set -e
            cd "${{ secrets.PROD_DEPLOY_PATH }}"

            echo "Configuring GitHub remote..."
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
            git fetch origin

            echo "Checking out production branch..."
            git checkout -B production
            git reset --hard origin/production

            echo "Writing production environment..."
            cat > .env << 'ENV_EOF'
            NODE_ENV=production
            PORT=8000
            APP_URL=${{ secrets.PROD_APP_URL }}
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            DB_HOST=${{ secrets.PROD_DB_HOST }}
            DB_PORT=${{ secrets.PROD_DB_PORT }}
            DB_NAME=${{ secrets.PROD_DB_NAME }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            DB_SSL=${{ secrets.PROD_DB_SSL }}
            DB_SSL_REJECT_UNAUTHORIZED=${{ secrets.PROD_DB_SSL_REJECT_UNAUTHORIZED }}
            DB_POOL_MAX=${{ secrets.PROD_DB_POOL_MAX }}
            DB_IDLE_TIMEOUT_MS=${{ secrets.PROD_DB_IDLE_TIMEOUT_MS }}
            DB_CONNECTION_TIMEOUT_MS=${{ secrets.PROD_DB_CONNECTION_TIMEOUT_MS }}
            REDIS_HOST=${{ secrets.PROD_REDIS_HOST }}
            REDIS_PORT=${{ secrets.PROD_REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            MINIO_ENDPOINT=${{ secrets.PROD_MINIO_ENDPOINT }}
            MINIO_PORT=${{ secrets.PROD_MINIO_PORT }}
            MINIO_USE_SSL=${{ secrets.PROD_MINIO_USE_SSL }}
            MINIO_ACCESS_KEY=${{ secrets.PROD_MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.PROD_MINIO_SECRET_KEY }}
            MINIO_BUCKET=${{ secrets.PROD_MINIO_BUCKET }}
            MINIO_PUBLIC_URL=${{ secrets.PROD_MINIO_PUBLIC_URL }}
            ES_NODE=${{ secrets.PROD_ES_NODE }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=7d
            FRONTEND_URL=${{ secrets.PROD_FRONTEND_URL }}
            SESSION_SECRET=${{ secrets.PROD_SESSION_SECRET }}
            LOG_LEVEL=${{ secrets.PROD_LOG_LEVEL }}
            SMTP_HOST=${{ secrets.PROD_SMTP_HOST }}
            SMTP_PORT=${{ secrets.PROD_SMTP_PORT }}
            SMTP_USER=${{ secrets.PROD_SMTP_USER }}
            SMTP_PASS=${{ secrets.PROD_SMTP_PASS }}
            SMTP_FROM=${{ secrets.PROD_SMTP_FROM }}
            MAIL_DOMAIN=${{ secrets.PROD_MAIL_DOMAIN }}
            MAIL_HOSTNAME=${{ secrets.PROD_MAIL_HOSTNAME }}
            INBOUND_WEBHOOK_SECRET=${{ secrets.PROD_INBOUND_WEBHOOK_SECRET }}
            SMTP_RELAY=${{ secrets.PROD_SMTP_RELAY }}
            SMTP_RELAY_USER=${{ secrets.PROD_SMTP_RELAY_USER }}
            SMTP_RELAY_PASS=${{ secrets.PROD_SMTP_RELAY_PASS }}
            DB_NAME=${{ secrets.PROD_DB_NAME }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_WS_URL=${{ secrets.PROD_WS_URL }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.PROD_APP_NAME }}
            ENV_EOF

            echo "Stripping YAML indentation from .env values..."
            sed -i 's/^[[:space:]]*//' .env

            echo "Removing stale backend .env override..."
            rm -f dims-backend/.env

            echo "Backing up database before deploy (if postgres is running)..."
            DATE=$(date +%Y-%m-%d-%H%M%S)
            if docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q postgres 2>/dev/null | grep -q .; then
              mkdir -p /backups/db
              docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres pg_dump -U "${{ secrets.PROD_DB_USER }}" "${{ secrets.PROD_DB_NAME }}" | gzip > "/backups/db/pre_deploy_${DATE}.sql.gz"
            fi

            echo "Pulling and restarting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            echo "Building app services fresh..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache api frontend
            echo "Building Dovecot with cache (reuses apt layer)..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build dovecot
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "Running database migrations..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api node ./node_modules/typeorm/cli.js -d dist/typeorm.config.js migration:run

            echo "Waiting for health check..."
            sleep 20
            curl -f http://localhost:8000/api/health || exit 1

            echo "Production deployment successful — ${{ github.sha }}"
