# Local development defaults.
#
# Docker Compose automatically includes this file when you run `docker compose up`
# from the project root. Keep production-like runs explicit with:
#   docker compose -f docker-compose.yml up -d --build

services:
  frontend:
    build:
      context: ./dims-frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./dims-backend/.env
    command: sh -c "if [ ! -x node_modules/.bin/next ]; then npm ci; fi; npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./dims-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3000
      - NEXT_PUBLIC_APP_NAME=DIMS (Dev)
      - INTERNAL_API_ORIGIN=http://api:8000
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
      - NEXT_WEBPACK_USEPOLLING=1
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000"]
      start_period: 90s

  api:
    build:
      context: ./dims-backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    volumes:
      - ./dims-backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
    ports:
      - "9229:9229"

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
