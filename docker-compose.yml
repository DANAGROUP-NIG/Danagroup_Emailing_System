
services:

  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dims_nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./dims-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
        - INTERNAL_API_ORIGIN=http://api:8000
        - "NEXT_PUBLIC_APP_NAME=DIMS — Dana Internal Mail"
    container_name: dims_frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
      - "NEXT_PUBLIC_APP_NAME=DIMS — Dana Internal Mail"
      - INTERNAL_API_ORIGIN=http://api:8000
    ports:
      - "3001:3000"  # Direct Next.js access (full stack via nginx on :3000)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./dims-backend
      dockerfile: Dockerfile
    container_name: dims_api
    env_file:
      - .env
      - ./dims-backend/.env
    environment:
      - PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ES_NODE=http://elasticsearch:9200
    ports:
      - "8000:8000"  # Direct API access (full stack via nginx on :3000)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dims_net

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dims_postgres
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${DB_NAME:-dims_db}
      POSTGRES_USER: ${DB_USER:-dims_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Avoids colliding with a local Postgres instance
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dims_user} -d ${DB_NAME:-dims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dims_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

  # ─── MinIO Object Storage ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dims_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # MinIO S3 API
      - "9001:9001"  # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: dims_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=dims-cluster
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
  nginx_logs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  dims_net:
    driver: bridge
