services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/dims-certbot:/var/www/certbot:ro

  frontend:
    environment:
      - JWT_SECRET=${JWT_SECRET}

  dovecot:
    volumes:
      - dovecot_mail:/var/mail
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - CERT_DIR=/etc/letsencrypt/live/${MAIL_HOSTNAME:-mail.danagroup.net}
