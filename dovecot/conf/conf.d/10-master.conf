## Master process and service definitions

service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  # Disable plain IMAP (no SSL) — force IMAPS only
  inet_listener imap {
    port = 0
  }
}

service pop3-login {
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
  # Disable plain POP3
  inet_listener pop3 {
    port = 0
  }
}

service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
    user = postfix
    group = postfix
  }
}
