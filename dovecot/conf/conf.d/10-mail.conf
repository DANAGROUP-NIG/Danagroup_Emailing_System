## Mail storage configuration — Maildir per virtual user
# Messages are written into Maildir by the DIMS API sync service
# Path: /var/mail/vhosts/<domain>/<localpart>/

mail_location = maildir:/var/mail/vhosts/%d/%n

# Virtual user home (same root as mail_location)
mail_home = /var/mail/vhosts/%d/%n

# Allow plaintext auth only over TLS
disable_plaintext_auth = yes

# Mail process runs as vmail
mail_uid = vmail
mail_gid = vmail

first_valid_uid = 5000
last_valid_uid = 5000

namespace inbox {
  inbox = yes
  separator = /
  prefix =

  mailbox INBOX {
    auto = subscribe
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Starred {
    auto = subscribe
    special_use = \Flagged
  }
}
