## Mail storage configuration — using dict-sql backend

# Use dict-sql driver backed by PostgreSQL
mail_location = dict:postgres:proxy::sql:/etc/dovecot/dovecot-dict-sql.conf.ext

# Virtual user mail directory (used only for lock files; actual storage is SQL)
mail_home = /var/mail/vhosts/%d/%n

# Allow plaintext auth only over TLS
disable_plaintext_auth = yes

# Mail process runs as vmail
mail_uid = vmail
mail_gid = vmail

first_valid_uid = 5000
last_valid_uid = 5000

namespace inbox {
  inbox = yes
  separator = /
  prefix =

  mailbox INBOX {
    auto = subscribe
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Starred {
    auto = subscribe
    special_use = \Flagged
  }
}
