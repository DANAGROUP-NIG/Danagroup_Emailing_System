## Dovecot main configuration — DIMS IMAP/POP3 server

protocols = imap pop3

listen = *

base_dir = /var/run/dovecot/
instance_name = dovecot
login_greeting = DIMS Mail Server ready.

# Log to stdout for Docker
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stderr

# Include modular config files
!include conf.d/*.conf
