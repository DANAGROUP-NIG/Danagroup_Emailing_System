worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # Docker's internal DNS — forces re-resolution on each request so container
    # IP changes after rebuilds don't cause 502s
    resolver 127.0.0.11 valid=10s ipv6=off;


    # ─── HTTP → HTTPS redirect (production domain) ───────────────────────────
    server {
        listen 80;
        server_name dims.danagroup.internal;
        return 301 https://$host$request_uri;
    }

    # ─── HTTP (localhost — direct proxy, no redirect) ──────────────────────────
    server {
        listen 80;
        server_name localhost 127.0.0.1 *.trycloudflare.com;

        client_max_body_size 60M;

        set $upstream_minio    http://minio:9000;
        set $upstream_api      http://api:8000;
        set $upstream_frontend http://frontend:3000;

        # ─── MinIO Object Storage (public file access) ───────────────────────────
        location /minio/ {
            proxy_pass         $upstream_minio/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            client_max_body_size 60M;
        }

        # ─── API routes ──────────────────────────────────────────────────────────
        location /api {
            proxy_pass         $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ─── Swagger API Docs ────────────────────────────────────────────────────
        location /api/docs {
            proxy_pass         $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        # ─── WebSocket ───────────────────────────────────────────────────────────
        location /socket.io {
            proxy_pass             $upstream_api;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_read_timeout     86400s;
        }

        # ─── Frontend ────────────────────────────────────────────────────────────
        location / {
            proxy_pass         $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ─── HTTPS (Production + localhost self-signed) ───────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name dims.danagroup.internal localhost 127.0.0.1;

        ssl_certificate     /etc/nginx/ssl/dims.crt;
        ssl_certificate_key /etc/nginx/ssl/dims.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 60M;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        set $upstream_minio    http://minio:9000;
        set $upstream_api      http://api:8000;
        set $upstream_frontend http://frontend:3000;

        # ─── MinIO Object Storage (public file access) ───────────────────────────
        location /minio/ {
            proxy_pass         $upstream_minio/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            client_max_body_size 60M;
        }

        # ─── API routes ──────────────────────────────────────────────────────────
        location /api {
            proxy_pass         $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ─── Swagger API Docs ────────────────────────────────────────────────────
        location /api/docs {
            proxy_pass         $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        # ─── WebSocket ───────────────────────────────────────────────────────────
        location /socket.io {
            proxy_pass             $upstream_api;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_read_timeout     86400s;
        }

        # ─── Frontend ────────────────────────────────────────────────────────────
        location / {
            proxy_pass         $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
